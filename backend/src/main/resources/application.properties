spring.application.name=corrida-treino

# --- Configuração do Banco de Dados H2 ---
# Usando banco em memória (os dados resetam ao reiniciar a aplicação)
spring.datasource.url=jdbc:h2:mem:corridadb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Alterado para o dialeto do H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- H2 Console (Acesse: localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Libera acesso para o console funcionar corretamente
spring.h2.console.settings.web-allow-others=true

# --- Porta da aplicação ---
server.port=8080

