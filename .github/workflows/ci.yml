name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-backend:
    name: Backend Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Ajustado para o caminho correto do seu pom.xml
          cache-dependency-path: backend/pom.xml

      - name: Instalar e Testar Backend
        working-directory: ./backend
        # Rodar checkstyle e testes em um comando otimiza o tempo de inicialização do Maven
        run: mvn clean install -DskipTests=false

      - name: Gerar relatório de cobertura
        working-directory: ./backend
        run: mvn jacoco:report
        continue-on-error: true

  build-frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: ./frontend
        run: npm ci

      - name: Executar Linting
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Executar testes
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build produção
        working-directory: ./frontend
        # O CI: false aqui impede que Warnings travem o deploy
        run: npm run build
        env:
          CI: false 

      - name: Verificar tamanho do build
        working-directory: ./frontend
        run: du -sh build/

  quality-gate:
    name: Quality Gate
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check status final
        run: |
          if [ "${{ needs.build-backend.result }}" != "success" ] || [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "❌ Build ou testes falharam!"
            exit 1
          fi
          echo "✅ Pipeline finalizada com sucesso!"